apiVersion: v2
name: postqueen-app
description: A Social Media Scheduling App
type: application
version: 1.1.0
appVersion: "3.0.4"
maintainers:
  - name: PostQueen
    email: support@postqueen.ai
    url: https://postqueen.ai
keywords:
  - social media
  - marketing
  - scheduling
  - queue
home: https://postqueen.ai
sources:
  - https://github.com/GkhanKINAY/postqueen-app
  - https://github.com/GkhanKINAY/postqueen-helmchart
dependencies:
  - name: postgresql
    version: 15.5.28
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 20.1.0
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
