apiVersion: v1
kind: Service
metadata:
  name: {{ include "postqueen.fullname" . }}
  labels:
    {{- include "postqueen.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.service.additionalPorts }}
    {{- toYaml .Values.service.additionalPorts | nindent 4 }}
    {{- end }}
  selector:
    {{- include "postqueen.selectorLabels" . | nindent 4 }}
