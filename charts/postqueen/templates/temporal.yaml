{{- if .Values.temporal.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "postqueen.fullname" . }}-temporal
  labels:
    {{- include "postqueen.labels" . | nindent 4 }}
    app.kubernetes.io/component: temporal
spec:
  ports:
    - port: 7233
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "postqueen.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: temporal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "postqueen.fullname" . }}-temporal
  labels:
    {{- include "postqueen.labels" . | nindent 4 }}
    app.kubernetes.io/component: temporal
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "postqueen.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: temporal
  template:
    metadata:
      labels:
        {{- include "postqueen.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: temporal
    spec:
      containers:
        - name: temporal
          image: "{{ .Values.temporal.image.repository }}:{{ .Values.temporal.image.tag }}"
          imagePullPolicy: {{ .Values.temporal.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: 7233
          env:
            # Persistence + visibility both use the dedicated PostgreSQL (no Elasticsearch).
            - name: DB
              value: "postgres12"
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: {{ .Values.temporal.postgresql.user | quote }}
            - name: POSTGRES_PWD
              value: {{ .Values.temporal.postgresql.password | quote }}
            - name: POSTGRES_SEEDS
              value: {{ printf "%s-temporal-postgres" (include "postqueen.fullname" .) | quote }}
            - name: ENABLE_ES
              value: "false"
          resources:
            {{- toYaml .Values.temporal.resources | nindent 12 }}
{{- end }}
