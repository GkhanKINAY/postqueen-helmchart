{{- if .Values.temporal.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "postqueen.fullname" . }}-temporal-postgres
  labels:
    {{- include "postqueen.labels" . | nindent 4 }}
    app.kubernetes.io/component: temporal-postgres
spec:
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "postqueen.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: temporal-postgres
{{- if .Values.temporal.postgresql.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "postqueen.fullname" . }}-temporal-postgres
  labels:
    {{- include "postqueen.labels" . | nindent 4 }}
    app.kubernetes.io/component: temporal-postgres
spec:
  accessModes:
    - ReadWriteOnce
  {{- with .Values.temporal.postgresql.persistence.storageClassName }}
  storageClassName: {{ . | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.temporal.postgresql.persistence.size }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "postqueen.fullname" . }}-temporal-postgres
  labels:
    {{- include "postqueen.labels" . | nindent 4 }}
    app.kubernetes.io/component: temporal-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "postqueen.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: temporal-postgres
  template:
    metadata:
      labels:
        {{- include "postqueen.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: temporal-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.temporal.postgresql.image | quote }}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: {{ .Values.temporal.postgresql.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.temporal.postgresql.password | quote }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.temporal.postgresql.resources | nindent 12 }}
      volumes:
        - name: data
        {{- if .Values.temporal.postgresql.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "postqueen.fullname" . }}-temporal-postgres
        {{- else }}
          emptyDir: {}
        {{- end }}
{{- end }}
